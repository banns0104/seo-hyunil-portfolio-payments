<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600"><rect width="1000" height="600" fill="#F5F6F8"></rect><text x="500" y="60" font-size="28" font-weight="800" fill="#191919" text-anchor="middle">TMAP × 어바웃피싱</text><text x="500" y="92" font-size="14" fill="#888" text-anchor="middle">위치 기반 낚시 데이터 양방향 연동</text><rect x="80" y="180" width="280" height="200" rx="20" fill="white"></rect><text x="220" y="220" font-size="20" font-weight="800" fill="#03C75A" text-anchor="middle">TMAP</text><text x="220" y="246" font-size="11" fill="#888" text-anchor="middle">SK텔레콤 모빌리티</text><rect x="100" y="266" width="240" height="32" rx="6" fill="#F5F6F8"></rect><text x="220" y="286" font-size="12" fill="#333" text-anchor="middle" font-weight="600">사용자 위치 / 내비게이션</text><rect x="100" y="306" width="240" height="32" rx="6" fill="#F5F6F8"></rect><text x="220" y="326" font-size="12" fill="#333" text-anchor="middle" font-weight="600">국내 지도 / POI</text><rect x="640" y="180" width="280" height="200" rx="20" fill="white"></rect><text x="780" y="220" font-size="20" font-weight="800" fill="#3182F6" text-anchor="middle">어바웃피싱</text><text x="780" y="246" font-size="11" fill="#888" text-anchor="middle">낚시 슈퍼앱</text><rect x="660" y="266" width="240" height="32" rx="6" fill="#F5F6F8"></rect><text x="780" y="286" font-size="12" fill="#333" text-anchor="middle" font-weight="600">낚시 포인트 / 선박 / 조황</text><rect x="660" y="306" width="240" height="32" rx="6" fill="#F5F6F8"></rect><text x="780" y="326" font-size="12" fill="#333" text-anchor="middle" font-weight="600">예약 / 결제</text><path d="M 360 260 Q 500 230 640 260" stroke="#3182F6" stroke-width="3" fill="none" stroke-dasharray="6 6"></path><polygon points="630,254 644,260 632,266" fill="#3182F6"></polygon><text x="500" y="220" font-size="12" fill="#3182F6" text-anchor="middle" font-weight="700">사용자 위치 / 내비</text><path d="M 640 320 Q 500 350 360 320" stroke="#7B61FF" stroke-width="3" fill="none" stroke-dasharray="6 6"></path><polygon points="370,326 356,320 370,314" fill="#7B61FF"></polygon><text x="500" y="370" font-size="12" fill="#7B61FF" text-anchor="middle" font-weight="700">낚시 포인트 / 예약 데이터</text><text x="500" y="450" font-size="16" font-weight="800" fill="#191919" text-anchor="middle">검색 → 예약 → 내비게이션 단일 퍼널</text><rect x="80" y="480" width="180" height="60" rx="10" fill="white" stroke="#EEEEEE"></rect><text x="170" y="516" font-size="13" font-weight="700" fill="#191919" text-anchor="middle">1. 앱에서 포인트 검색</text><text x="280" y="516" font-size="14" fill="#3182F6" font-weight="800">→</text><rect x="300" y="480" width="180" height="60" rx="10" fill="white" stroke="#EEEEEE"></rect><text x="390" y="516" font-size="13" font-weight="700" fill="#191919" text-anchor="middle">2. 선박 예약</text><text x="500" y="516" font-size="14" fill="#3182F6" font-weight="800">→</text><rect x="520" y="480" width="180" height="60" rx="10" fill="white" stroke="#EEEEEE"></rect><text x="610" y="516" font-size="13" font-weight="700" fill="#191919" text-anchor="middle">3. TMAP 자동 길찾기</text><text x="720" y="516" font-size="14" fill="#3182F6" font-weight="800">→</text><rect x="740" y="480" width="180" height="60" rx="10" fill="white" stroke="#EEEEEE"></rect><text x="830" y="516" font-size="13" font-weight="700" fill="#191919" text-anchor="middle">4. 출조</text></svg>